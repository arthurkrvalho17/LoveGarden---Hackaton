<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveGarden – Homenagens Dia das Mães</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="home.css">
</head>
<body>
<div class="scene">
  <div class="bg-image"></div>
  <div class="bg-tint"></div>
  <div class="bg-vignette"></div>

  <div class="content">
    <div class="header">
      <img class="logo-img" src="https://i.imgur.com/AGaLl66.png" alt="LoveGarden logo">
      <span class="brand-name">LoveGarden</span>
    </div>

    <div class="card">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21C12 21 4 13.5 4 8.5C4 6 6 4 8.5 4C10 4 11.3 4.8 12 6C12.7 4.8 14 4 15.5 4C18 4 20 6 20 8.5C20 13.5 12 21 12 21Z" fill="white" opacity="0.95"/>
        </svg>
      </div>
      <div class="card-text">
        <div class="tagline">Plante Amor. Celebre Mães.</div>
        <div class="sub">Uma homenagem especial para ela ✿</div>
      </div>
      <div class="card-play" routerLink="/garden" style="cursor:pointer">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    </div>
    </div>

    <div class="bottom">
      <button class="enter-btn" routerLink="/garden">Entrar no Jardim</button>
        <div class="credits">Desenvolvido por Arthur Carvalho</div>
    </div>
  </div>

  <div class="nav-bar">
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      Início
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Homenagens
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Criar
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      Músicas
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Mais
    </div>
  </div>
</div>

<script>
const scene = document.querySelector('.scene');
const petalColors = ['#f9a8d4','#fbcfe8','#fce7f3','#f472b6','#e879f9','#d8b4fe','#fda4af'];

for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  const size = 5 + Math.random() * 11;
  const br1 = 40 + Math.random()*30, br2 = 20 + Math.random()*30;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*-5}%;
    background:${petalColors[Math.floor(Math.random()*petalColors.length)]};
    animation-duration:${6 + Math.random()*9}s;
    animation-delay:${Math.random()*10}s;
    transform:rotate(${Math.random()*360}deg);
    border-radius:${br1}% ${br2}% ${br1}% ${br2}%;
    opacity:0;
  `;
  scene.appendChild(p);
}
</script>
</body>
</html>
